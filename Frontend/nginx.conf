server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enviar todas las rutas a index.html (PushState routing de Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos para optimizar tiempos de carga
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
