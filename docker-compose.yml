version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devsu-backend-test:latest
    container_name: devsu-backend-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SERVER_PORT=8080
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: devsu-frontend-test:latest
    container_name: devsu-frontend-app
    ports:
      - "4200:80"
    depends_on:
      - app
    restart: unless-stopped