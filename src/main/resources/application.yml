spring:
  application:
    name: TestBackendDevsu
  
  datasource:
    url: jdbc:h2:mem:devsudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # JPA creará/actualizará la base en función de las entidades
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always # Permite la ejecución de scripts (ej. BaseDatos.sql) al iniciar si existiese schema.sql/data.sql

server:
  port: 8080